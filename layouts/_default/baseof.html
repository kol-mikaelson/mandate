<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ "/css/main.css" | relURL }}" />
  {{ block "head" . }}{{ end }}
</head>
<body class="{{ block "body-class" . }}{{ end }}">
  {{- if .IsPage -}}<div id="progress-bar"></div>{{- end -}}
  {{ partial "nav.html" . }}
  <div class="mobile-nav">
    {{ range .Site.Menus.main }}<a href="{{ .URL }}">{{ .Name }}</a>{{ end }}
  </div>
  <main>{{ block "main" . }}{{ end }}</main>
  {{ partial "footer.html" . }}
  <script src="{{ "/js/main.js" | relURL }}"></script>
</body>
</html>
