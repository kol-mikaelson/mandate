{{ define "main" }}
<div class="container" style="padding-top:var(--stack-lg);padding-bottom:var(--stack-lg);">
  <header class="page-header"><h1>{{ .Title }}</h1></header>
  <div class="secondary-grid">
    {{ range .Pages }}
    <a href="{{ .RelPermalink }}" class="secondary-card">
      <span class="card-tag">{{ .Title }}</span>
      <h3 class="card-title">{{ .Title }}</h3>
      <div class="card-meta"><span>{{ len .Pages }} articles</span></div>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
